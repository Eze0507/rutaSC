# render.yaml — Blueprint de despliegue para Render
# Documentación: https://render.com/docs/blueprint-spec

services:
  - type: web
    name: rutasc-backend
    env: docker          # <-- CAMBIO CLAVE: pasamos de python a docker
    region: oregon
    plan: free
    # Se eliminan 'buildCommand' y 'startCommand' de aquí
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: False
      - key: DATABASE_URL
        fromDatabase:
          name: rutasc-db
          property: connectionString
      - key: ALLOWED_HOSTS
        value: .onrender.com
      - key: API_KEY_GOOGLE
        sync: false
      - key: URL_GOOGLE_PLACES
        value: https://places.googleapis.com/v1/places:searchText
      - key: URL_GOOGLE_ROUTES
        value: https://routes.googleapis.com/directions/v2:computeRoutes

databases:
  - name: rutasc-db
    databaseName: rutasc
    user: rutasc
    plan: free
